<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم — Professor Investment</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222535;--border:#2e3148;--accent:#6c63ff;--accent2:#4ecca3;--danger:#ff4757;--warning:#ffa502;--success:#2ed573;--text:#e8eaf6;--muted:#8892b0;--radius:10px;--sidebar-w:220px;--topbar-h:56px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;overflow-x:hidden}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:100%;max-width:380px;text-align:center}
.login-box .logo{font-size:48px;margin-bottom:12px}
.login-box h1{font-size:22px;margin-bottom:6px}
.login-box p{color:var(--muted);margin-bottom:28px;font-size:13px}
.login-box input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;margin-bottom:14px;text-align:right;direction:ltr}
.login-box input:focus{outline:none;border-color:var(--accent)}
.login-error{color:var(--danger);font-size:13px;margin-top:-6px;margin-bottom:10px;display:none}
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:var(--topbar-h);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;gap:12px}
.topbar-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;white-space:nowrap}
.topbar-brand span{font-size:20px}
.topbar-right{display:flex;align-items:center;gap:10px}
.badge-live{background:var(--success);color:#000;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px 8px;line-height:1}
.layout{display:flex;flex:1;position:relative}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-left:1px solid var(--border);padding:16px 0;flex-shrink:0;position:sticky;top:var(--topbar-h);height:calc(100vh - var(--topbar-h));overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;color:var(--muted);transition:all .15s;border-right:3px solid transparent;font-size:13.5px;white-space:nowrap}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--accent);border-right-color:var(--accent);background:var(--surface2)}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-right:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center}
.nav-section{padding:10px 18px 4px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150}
.sidebar-overlay.open{display:block}
.main{flex:1;padding:24px;overflow-y:auto;min-width:0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.section-title{font-size:20px;font-weight:700}
.section-subtitle{color:var(--muted);font-size:13px;margin-top:2px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.stat-label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.stat-value{font-size:24px;font-weight:700}
.stat-value.green{color:var(--success)}.stat-value.yellow{color:var(--warning)}.stat-value.purple{color:var(--accent)}.stat-value.cyan{color:var(--accent2)}
.stat-sub{color:var(--muted);font-size:11px;margin-top:3px}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;transition:all .15s;font-family:inherit}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-search{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;direction:rtl;font-family:inherit;flex:1;min-width:140px}
.filter-search:focus{outline:none;border-color:var(--accent)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:500px}
thead th{background:var(--surface2);padding:10px 14px;text-align:right;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-pending{background:rgba(255,165,2,.15);color:var(--warning)}
.badge-completed{background:rgba(46,213,115,.15);color:var(--success)}
.badge-rejected{background:rgba(255,71,87,.15);color:var(--danger)}
.badge-processing{background:rgba(108,99,255,.15);color:var(--accent)}
.badge-active{background:rgba(46,213,115,.15);color:var(--success)}
.badge-stopped{background:rgba(136,146,176,.15);color:var(--muted)}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:opacity .15s;white-space:nowrap;font-family:inherit}
.btn:hover{opacity:.85}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-success{background:var(--success);color:#000}.btn-danger{background:var(--danger);color:#fff}
.btn-accent{background:var(--accent);color:#fff}.btn-warning{background:var(--warning);color:#000}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:4px 10px;font-size:11px}.btn-group{display:flex;gap:6px;flex-wrap:wrap}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
.alert-banner{background:rgba(255,165,2,.1);border:1px solid rgba(255,165,2,.3);border-radius:var(--radius);padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;font-size:13px;flex-wrap:wrap}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:17px;margin-bottom:5px}
.modal p{color:var(--muted);font-size:13px;margin-bottom:18px}
.modal-info{background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:14px}
.modal-info-row{display:flex;justify-content:space-between;margin-bottom:7px;font-size:13px;gap:10px}
.modal-info-row:last-child{margin-bottom:0}
.modal-info-label{color:var(--muted);flex-shrink:0}
.modal-info-value{text-align:left;word-break:break-all}
.modal-input{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:10px;direction:ltr;text-align:right;font-family:inherit}
.modal-input:focus{outline:none;border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.topup-card{background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.topup-card h3{font-size:14px;margin-bottom:3px;color:var(--accent)}
.topup-card p{color:var(--muted);font-size:12px;margin-bottom:14px}
.topup-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end}
.topup-label{font-size:11px;color:var(--muted);margin-bottom:4px;text-align:right}
.wallet-address{font-family:'Courier New',monospace;font-size:11px;color:var(--accent2);background:var(--bg);padding:3px 6px;border-radius:4px;border:1px solid var(--border);display:inline-block;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;vertical-align:middle}
.network-tag{display:inline-block;padding:2px 7px;border-radius:12px;font-size:11px;font-weight:600;background:rgba(78,204,163,.15);color:var(--accent2)}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;z-index:999;transition:transform .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.success{border-color:var(--success);color:var(--success)}
#toast.error{border-color:var(--danger);color:var(--danger)}
.loading{text-align:center;padding:60px;color:var(--muted);font-size:13px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.mono{font-family:'Courier New',monospace;font-size:12px;color:var(--accent2)}
.user-avatar{width:34px;height:34px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.user-info{display:flex;align-items:center;gap:8px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.card-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
@media(max-width:768px){
  .sidebar{position:fixed;top:var(--topbar-h);right:0;height:calc(100vh - var(--topbar-h));z-index:160;transform:translateX(110%);transition:transform .25s ease;border-left:1px solid var(--border);width:240px}
  .sidebar.mobile-open{transform:translateX(0)}
  .hamburger{display:block}
  .main{padding:14px}
  .two-col{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px}
  .stat-card{padding:14px}
  .stat-value{font-size:20px}
  .topup-row{grid-template-columns:1fr 1fr}
  .section-title{font-size:17px}
  table{min-width:420px}
  .badge-live{display:none}
}
@media(max-width:480px){
  .topup-row{grid-template-columns:1fr}
  .topup-row button{width:100%}
  .stats-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="logo">🏦</div>
    <h1>Professor Investment</h1>
    <p>لوحة تحكم الأدمن</p>
    <input type="password" id="api-key-input" placeholder="أدخل ADMIN_API_KEY" autocomplete="current-password"/>
    <div class="login-error" id="login-error">❌ مفتاح خاطئ، حاول مجدداً</div>
    <button class="btn btn-accent" style="width:100%;padding:12px" onclick="doLogin()">دخول</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <div class="topbar-brand"><span>🏦</span> Professor Investment</div>
      <span class="badge-live">LIVE</span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost btn-sm" onclick="refreshAll()">🔄 تحديث</button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">خروج</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar">
      <div class="nav-section">الرئيسية</div>
      <div class="nav-item active" onclick="nav('dashboard')" id="nav-dashboard"><span class="nav-icon">📊</span> الرئيسية</div>
      <div class="nav-section">العمليات</div>
      <div class="nav-item" onclick="nav('deposits')" id="nav-deposits"><span class="nav-icon">💰</span> الإيداعات<span class="nav-badge" id="badge-deposits" style="display:none">0</span></div>
      <div class="nav-item" onclick="nav('withdrawals')" id="nav-withdrawals"><span class="nav-icon">💸</span> السحوبات<span class="nav-badge" id="badge-withdrawals" style="display:none">0</span></div>
      <div class="nav-section">إدارة</div>
      <div class="nav-item" onclick="nav('users')" id="nav-users"><span class="nav-icon">👥</span> المستخدمون</div>
      <div class="nav-item" onclick="nav('notify')" id="nav-notify"><span class="nav-icon">📣</span> الإشعارات</div>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
    <div class="main" id="main-content">
      <div class="loading"><div class="spinner"></div>جاري التحميل...</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-deposit">
  <div class="modal">
    <h2 id="mdep-title"></h2><p id="mdep-subtitle"></p>
    <div class="modal-info" id="mdep-info"></div>
    <textarea class="modal-input" id="mdep-reason" rows="2" placeholder="سبب الرفض..." style="display:none;direction:rtl;text-align:right;resize:none"></textarea>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-deposit')">إلغاء</button><button class="btn" id="mdep-confirm-btn" onclick="confirmDepositAction()"></button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-withdrawal">
  <div class="modal">
    <h2 id="mwith-title"></h2><p id="mwith-subtitle"></p>
    <div class="modal-info" id="mwith-info"></div>
    <textarea class="modal-input" id="mwith-reason" rows="2" placeholder="سبب الرفض..." style="display:none;direction:rtl;text-align:right;resize:none"></textarea>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-withdrawal')">إلغاء</button><button class="btn" id="mwith-confirm-btn" onclick="confirmWithdrawalAction()"></button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-balance">
  <div class="modal">
    <h2>💰 تعديل الرصيد</h2><p id="mbal-subtitle"></p>
    <div class="modal-info" id="mbal-info"></div>
    <select class="modal-input" id="mbal-op"><option value="add">➕ إضافة للرصيد</option><option value="set">🔄 تعيين رصيد جديد</option></select>
    <input type="number" class="modal-input" id="mbal-amount" placeholder="المبلغ بـ USDT" min="0" step="0.01"/>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-balance')">إلغاء</button><button class="btn btn-accent" onclick="confirmBalanceAction()">✔ تطبيق</button></div>
  </div>
</div>

<div id="toast"></div>

<script>
let API_KEY='',currentPage='dashboard';
let allDeposits=[],allWithdrawals=[],allUsers=[];
let pendingAction=null,pendingBalanceUser=null;
let depFilter='all',withFilter='all',userSearch='';

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('mobile-open');document.getElementById('sidebar-overlay').classList.toggle('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('mobile-open');document.getElementById('sidebar-overlay').classList.remove('open');}

function doLogin(){
  const key=document.getElementById('api-key-input').value.trim();if(!key)return;API_KEY=key;
  apiFetch('/admin/users?limit=1').then(()=>{
    document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='flex';
    document.getElementById('login-error').style.display='none';sessionStorage.setItem('admin_key',key);nav('dashboard');
  }).catch(()=>{API_KEY='';document.getElementById('login-error').style.display='block';});
}
function logout(){sessionStorage.removeItem('admin_key');API_KEY='';document.getElementById('login-screen').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('api-key-input').value='';}
document.getElementById('api-key-input').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
window.addEventListener('load',()=>{const s=sessionStorage.getItem('admin_key');if(s){document.getElementById('api-key-input').value=s;doLogin();}});

async function apiFetch(path,options={}){
  const res=await fetch(path,{...options,headers:{'Content-Type':'application/json','x-admin-key':API_KEY,...(options.headers||{})}});
  if(res.status===401)throw new Error('unauthorized');
  if(!res.ok){const b=await res.json().catch(()=>{});throw new Error((b&&b.error)||res.statusText);}
  return res.json();
}

function nav(page){
  currentPage=page;closeSidebar();
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('nav-'+page);if(el)el.classList.add('active');
  document.getElementById('main-content').innerHTML='<div class="loading"><div class="spinner"></div>جاري التحميل...</div>';
  if(page==='dashboard')loadDashboard();
  else if(page==='deposits')loadDeposits();
  else if(page==='withdrawals')loadWithdrawals();
  else if(page==='users')loadUsers();
  else if(page==='notify')loadNotify();
}
function refreshAll(){loadBadges();nav(currentPage);}

async function loadBadges(){
  try{
    const[d,w]=await Promise.all([apiFetch('/admin/deposits?status=pending'),apiFetch('/admin/withdrawals?status=pending')]);
    const db=document.getElementById('badge-deposits'),wb=document.getElementById('badge-withdrawals');
    db.textContent=d.count;db.style.display=d.count>0?'':'none';
    wb.textContent=w.count;wb.style.display=w.count>0?'':'none';
  }catch(_){}
}

async function loadDashboard(){
  try{
    const[ud,dd,wd]=await Promise.all([apiFetch('/admin/users'),apiFetch('/admin/deposits'),apiFetch('/admin/withdrawals')]);
    const users=ud.users,deps=dd.deposits,withs=wd.withdrawals;
    const totalBal=users.reduce((s,u)=>s+(u.balance||0),0);
    const totalDep=deps.filter(d=>d.status==='completed').reduce((s,d)=>s+d.amount,0);
    const pendDeps=deps.filter(d=>d.status==='pending');
    const pendWiths=withs.filter(w=>w.status==='pending');
    const activeBots=users.filter(u=>u.botStatus==='active').length;
    document.getElementById('main-content').innerHTML=`
      <div class="section-header"><div><div class="section-title">📊 الرئيسية</div><div class="section-subtitle">نظرة عامة على المنصة</div></div><button class="btn btn-ghost btn-sm" onclick="refreshAll()">🔄 تحديث</button></div>
      ${pendDeps.length>0?`<div class="alert-banner">⚠️ <strong>${pendDeps.length}</strong> طلب إيداع معلق <button class="btn btn-warning btn-sm" style="margin-right:auto" onclick="nav('deposits')">عرض</button></div>`:''}
      ${pendWiths.length>0?`<div class="alert-banner">⚠️ <strong>${pendWiths.length}</strong> طلب سحب معلق <button class="btn btn-warning btn-sm" style="margin-right:auto" onclick="nav('withdrawals')">عرض</button></div>`:''}
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">المستخدمون</div><div class="stat-value purple">${users.length}</div><div class="stat-sub">مسجل</div></div>
        <div class="stat-card"><div class="stat-label">الرصيد الإجمالي</div><div class="stat-value cyan">${fmt(totalBal)}</div><div class="stat-sub">USDT</div></div>
        <div class="stat-card"><div class="stat-label">بوتات نشطة</div><div class="stat-value green">${activeBots}</div><div class="stat-sub">من ${users.length}</div></div>
        <div class="stat-card"><div class="stat-label">إيداعات معلقة</div><div class="stat-value yellow">${pendDeps.length}</div><div class="stat-sub">بانتظار الموافقة</div></div>
        <div class="stat-card"><div class="stat-label">سحوبات معلقة</div><div class="stat-value yellow">${pendWiths.length}</div><div class="stat-sub">بانتظار التنفيذ</div></div>
        <div class="stat-card"><div class="stat-label">إجمالي الإيداعات</div><div class="stat-value green">${fmt(totalDep)}</div><div class="stat-sub">USDT مؤكدة</div></div>
      </div>
      <div class="two-col">
        <div><div style="font-weight:700;margin-bottom:10px;font-size:14px">💰 إيداعات معلقة</div>
          <div class="table-wrap"><table><thead><tr><th>المستخدم</th><th>المبلغ</th><th>إجراء</th></tr></thead>
          <tbody>${pendDeps.length===0?`<tr><td colspan="3"><div class="empty" style="padding:20px">لا يوجد</div></td></tr>`:
            pendDeps.slice(0,5).map(d=>`<tr><td class="mono">${d.telegramId}</td><td style="font-weight:600">${fmt(d.amount)}</td><td><div class="btn-group"><button class="btn btn-success btn-sm" onclick="openDepositModal('${d._id}','approve',${esc(d)})">✔</button><button class="btn btn-danger btn-sm" onclick="openDepositModal('${d._id}','reject',${esc(d)})">✘</button></div></td></tr>`).join('')}
          </tbody></table></div></div>
        <div><div style="font-weight:700;margin-bottom:10px;font-size:14px">💸 سحوبات معلقة</div>
          <div class="table-wrap"><table><thead><tr><th>المستخدم</th><th>المبلغ</th><th>إجراء</th></tr></thead>
          <tbody>${pendWiths.length===0?`<tr><td colspan="3"><div class="empty" style="padding:20px">لا يوجد</div></td></tr>`:

document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id);}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open').forEach(el=>closeModal(el.id));});
function esc(obj){return JSON.stringify(obj).replace(/"/g,'&quot;');}
function fmt(n){return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleString('ar',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function statusBadge(s){const m={pending:'<span class="badge badge-pending">⏳ معلق</span>',completed:'<span class="badge badge-completed">✅ مكتمل</span>',rejected:'<span class="badge badge-rejected">❌ مرفوض</span>',processing:'<span class="badge badge-processing">⚙️ جاري</span>',active:'<span class="badge badge-active">🟢 نشط</span>',stopped:'<span class="badge badge-stopped">⏹️ متوقف</span>'};return m[s]||`<span class="badge">${s}</span>`;}
function copyText(text){navigator.clipboard.writeText(text).then(()=>showToast('✔ تم النسخ','success')).catch(()=>{const el=document.createElement('textarea');el.value=text;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);showToast('✔ تم النسخ','success');});}
let toastTimer;
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`show ${type}`;clearTimeout(toastTimer);toastTimer=setTimeout(()=>{t.className='';},3500);}
function showError(msg){document.getElementById('main-content').innerHTML=`<div class="empty" style="margin-top:80px"><div class="empty-icon">⚠️</div><div style="color:var(--danger);font-weight:600">${msg}</div><button class="btn btn-ghost" style="margin-top:14px" onclick="nav(currentPage)">إعادة المحاولة</button></div>`;}
setInterval(()=>{if(API_KEY)loadBadges();},30000);
</script>
