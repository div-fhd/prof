<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم الأدمن</title>
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#222535; --border:#2e3148;
    --accent:#6c63ff; --accent2:#4ecca3; --danger:#ff4757; --warning:#ffa502;
    --success:#2ed573; --text:#e8eaf6; --muted:#8892b0; --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

  /* Login */
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:100%;max-width:380px;text-align:center}
  .login-box .logo{font-size:48px;margin-bottom:12px}
  .login-box h1{font-size:22px;margin-bottom:6px}
  .login-box p{color:var(--muted);margin-bottom:28px;font-size:13px}
  .login-box input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;margin-bottom:14px;text-align:right;direction:ltr}
  .login-box input:focus{outline:none;border-color:var(--accent)}
  .login-error{color:var(--danger);font-size:13px;margin-top:-6px;margin-bottom:10px;display:none}

  /* App shell */
  #app{display:none;flex-direction:column;min-height:100vh}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .topbar-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
  .topbar-brand span{font-size:22px}
  .topbar-right{display:flex;align-items:center;gap:12px}
  .badge-live{background:var(--success);color:#000;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
  .layout{display:flex;flex:1}

  /* Sidebar */
  .sidebar{width:220px;background:var(--surface);border-left:1px solid var(--border);padding:20px 0;flex-shrink:0}
  .nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;color:var(--muted);transition:all .15s;border-right:3px solid transparent;font-size:13.5px}
  .nav-item:hover{color:var(--text);background:var(--surface2)}
  .nav-item.active{color:var(--accent);border-right-color:var(--accent);background:var(--surface2)}
  .nav-icon{font-size:16px;width:20px;text-align:center}
  .nav-badge{margin-right:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;min-width:20px;text-align:center}

  /* Main */
  .main{flex:1;padding:28px;overflow-y:auto}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .section-title{font-size:20px;font-weight:700}
  .section-subtitle{color:var(--muted);font-size:13px;margin-top:2px}

  /* Stats */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;margin-bottom:28px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
  .stat-label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  .stat-value{font-size:26px;font-weight:700}
  .stat-value.green{color:var(--success)} .stat-value.yellow{color:var(--warning)}
  .stat-value.purple{color:var(--accent)} .stat-value.cyan{color:var(--accent2)}
  .stat-sub{color:var(--muted);font-size:12px;margin-top:4px}

  /* Filter bar */
  .filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
  .filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;transition:all .15s}
  .filter-btn:hover{border-color:var(--accent);color:var(--text)}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .filter-search{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;width:220px;direction:rtl}
  .filter-search:focus{outline:none;border-color:var(--accent)}

  /* Table */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead th{background:var(--surface2);padding:12px 16px;text-align:right;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border)}
  tbody td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--surface2)}

  /* Badges */
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
  .badge-pending{background:rgba(255,165,2,.15);color:var(--warning)}
  .badge-completed{background:rgba(46,213,115,.15);color:var(--success)}
  .badge-rejected{background:rgba(255,71,87,.15);color:var(--danger)}
  .badge-processing{background:rgba(108,99,255,.15);color:var(--accent)}
  .badge-active{background:rgba(46,213,115,.15);color:var(--success)}
  .badge-stopped{background:rgba(136,146,176,.15);color:var(--muted)}

  /* Buttons */
  .btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:opacity .15s;white-space:nowrap;font-family:inherit}
  .btn:hover{opacity:.85} .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-success{background:var(--success);color:#000}
  .btn-danger{background:var(--danger);color:#fff}
  .btn-accent{background:var(--accent);color:#fff}
  .btn-warning{background:var(--warning);color:#000}
  .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .btn-sm{padding:4px 10px;font-size:11px}
  .btn-group{display:flex;gap:6px}

  /* Empty */
  .empty{text-align:center;padding:48px 20px;color:var(--muted)}
  .empty-icon{font-size:40px;margin-bottom:12px}

  /* Alert banner */
  .alert-banner{background:rgba(255,165,2,.1);border:1px solid rgba(255,165,2,.3);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;font-size:13px}
  .alert-banner.success{background:rgba(46,213,115,.1);border-color:rgba(46,213,115,.3)}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px;width:100%;max-width:460px}
  .modal h2{font-size:18px;margin-bottom:6px}
  .modal p{color:var(--muted);font-size:13px;margin-bottom:20px}
  .modal-info{background:var(--surface2);border-radius:8px;padding:14px;margin-bottom:20px}
  .modal-info-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px}
  .modal-info-row:last-child{margin-bottom:0}
  .modal-info-label{color:var(--muted)}
  .modal-input{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:10px;direction:ltr;text-align:right;font-family:inherit}
  .modal-input:focus{outline:none;border-color:var(--accent)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

  /* Manual top-up card */
  .topup-card{background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);padding:24px;margin-bottom:28px}
  .topup-card h3{font-size:15px;margin-bottom:4px;color:var(--accent)}
  .topup-card p{color:var(--muted);font-size:12px;margin-bottom:16px}
  .topup-row{display:grid;grid-template-columns:1fr 1fr auto auto;gap:10px;align-items:end}
  .topup-label{font-size:11px;color:var(--muted);margin-bottom:4px;text-align:right}

  /* Toast */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 24px;font-size:13px;z-index:999;transition:transform .3s ease;pointer-events:none;white-space:nowrap}
  #toast.show{transform:translateX(-50%) translateY(0)}
  #toast.success{border-color:var(--success);color:var(--success)}
  #toast.error{border-color:var(--danger);color:var(--danger)}

  /* Loading */
  .loading{text-align:center;padding:60px;color:var(--muted);font-size:13px}
  .spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .mono{font-family:'Courier New',monospace;font-size:12px;color:var(--accent2)}
  .user-avatar{width:36px;height:36px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
  .user-info{display:flex;align-items:center;gap:10px}

  @media(max-width:700px){
    .sidebar{display:none}
    .stats-grid{grid-template-columns:1fr 1fr}
    .main{padding:16px}
    .topup-row{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">🤖</div>
    <h1>لوحة التحكم</h1>
    <p>منصة التداول الذكية — Admin Panel</p>
    <input type="password" id="api-key-input" placeholder="أدخل ADMIN_API_KEY" />
    <div class="login-error" id="login-error">❌ مفتاح غير صحيح أو السيرفر غير متاح</div>
    <button class="btn btn-accent" style="width:100%;padding:12px;font-size:14px" onclick="doLogin()">دخول</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand"><span>🤖</span> لوحة التحكم</div>
    <div class="topbar-right">
      <span class="badge-live">● مباشر</span>
      <button class="btn btn-ghost btn-sm" onclick="refreshAll()">🔄 تحديث</button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">خروج</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
        <span class="nav-icon">📊</span> الرئيسية
      </div>
      <div class="nav-item" onclick="showPage('deposits')" id="nav-deposits">
        <span class="nav-icon">💰</span> الإيداعات
        <span class="nav-badge" id="badge-deposits" style="display:none">0</span>
      </div>
      <div class="nav-item" onclick="showPage('withdrawals')" id="nav-withdrawals">
        <span class="nav-icon">💸</span> السحوبات
        <span class="nav-badge" id="badge-withdrawals" style="display:none">0</span>
      </div>
      <div class="nav-item" onclick="showPage('users')" id="nav-users">
        <span class="nav-icon">👥</span> المستخدمون
      </div>
    </div>

    <div class="main" id="main-content">
      <div class="loading"><div class="spinner"></div>جاري التحميل...</div>
    </div>
  </div>
</div>

<!-- DEPOSIT MODAL -->
<div class="modal-overlay" id="modal-deposit">
  <div class="modal">
    <h2 id="mdep-title">معالجة الإيداع</h2>
    <p id="mdep-subtitle"></p>
    <div class="modal-info" id="mdep-info"></div>
    <textarea class="modal-input" id="mdep-reason" placeholder="سبب الرفض (اختياري)" rows="3" style="display:none;resize:none"></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-deposit')">إلغاء</button>
      <button class="btn" id="mdep-confirm-btn" onclick="confirmDepositAction()">تأكيد</button>
    </div>
  </div>
</div>

<!-- WITHDRAWAL MODAL -->
<div class="modal-overlay" id="modal-withdrawal">
  <div class="modal">
    <h2 id="mwith-title">معالجة السحب</h2>
    <p id="mwith-subtitle"></p>
    <div class="modal-info" id="mwith-info"></div>
    <textarea class="modal-input" id="mwith-reason" placeholder="سبب الرفض (اختياري)" rows="3" style="display:none;resize:none"></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-withdrawal')">إلغاء</button>
      <button class="btn" id="mwith-confirm-btn" onclick="confirmWithdrawalAction()">تأكيد</button>
    </div>
  </div>
</div>

<!-- BALANCE MODAL -->
<div class="modal-overlay" id="modal-balance">
  <div class="modal">
    <h2>تعديل الرصيد يدوياً</h2>
    <p id="mbal-subtitle"></p>
    <div class="modal-info" id="mbal-info"></div>
    <select class="modal-input" id="mbal-op" style="cursor:pointer">
      <option value="add">➕ إضافة للرصيد الحالي</option>
      <option value="set">🔄 تعيين رصيد جديد</option>
    </select>
    <input type="number" class="modal-input" id="mbal-amount" placeholder="المبلغ بـ USDT" min="0" step="0.01" />
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-balance')">إلغاء</button>
      <button class="btn btn-accent" onclick="confirmBalanceAction()">✔ تطبيق</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════ STATE ══════════════
let API_KEY = '';
let currentPage = 'dashboard';
let allDeposits = [], allWithdrawals = [], allUsers = [];
let pendingAction = null;
let pendingBalanceUser = null;
let depFilter = 'all', withFilter = 'all', userSearch = '';

// ══════════════ AUTH ══════════════
function doLogin() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  API_KEY = key;
  apiFetch('/admin/users?limit=1')
    .then(() => {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('login-error').style.display = 'none';
      sessionStorage.setItem('admin_key', key);
      showPage('dashboard');
    })
    .catch(() => {
      API_KEY = '';
      document.getElementById('login-error').style.display = 'block';
    });
}
function logout() {
  sessionStorage.removeItem('admin_key');
  API_KEY = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('api-key-input').value = '';
}
document.getElementById('api-key-input').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
window.addEventListener('load', () => {
  const s = sessionStorage.getItem('admin_key');
  if (s) { document.getElementById('api-key-input').value = s; doLogin(); }
});

// ══════════════ API ══════════════
async function apiFetch(path, options={}) {
  const res = await fetch(path, {
    ...options,
    headers: { 'Content-Type':'application/json', 'x-admin-key':API_KEY, ...(options.headers||{}) },
  });
  if (res.status===401) throw new Error('unauthorized');
  if (!res.ok) { const b=await res.json().catch(()=>{}); throw new Error((b&&b.error)||res.statusText); }
  return res.json();
}

// ══════════════ NAV ══════════════
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-'+page).classList.add('active');
  document.getElementById('main-content').innerHTML = '<div class="loading"><div class="spinner"></div>جاري التحميل...</div>';
  if (page==='dashboard')   loadDashboard();
  if (page==='deposits')    loadDeposits();
  if (page==='withdrawals') loadWithdrawals();
  if (page==='users')       loadUsers();
}
function refreshAll() { loadBadges(); showPage(currentPage); }

// ══════════════ BADGES ══════════════
async function loadBadges() {
  try {
    const [d,w] = await Promise.all([
      apiFetch('/admin/deposits?status=pending'),
      apiFetch('/admin/withdrawals?status=pending'),
    ]);
    const db=document.getElementById('badge-deposits'), wb=document.getElementById('badge-withdrawals');
    db.textContent=d.count; db.style.display=d.count>0?'inline-block':'none';
    wb.textContent=w.count; wb.style.display=w.count>0?'inline-block':'none';
  } catch(_) {}
}

// ══════════════ DASHBOARD ══════════════
async function loadDashboard() {
  try {
    const [ud,dd,wd] = await Promise.all([
      apiFetch('/admin/users'),
      apiFetch('/admin/deposits'),
      apiFetch('/admin/withdrawals'),
    ]);
    const users=ud.users, deps=dd.deposits, withs=wd.withdrawals;
    const totalBalance = users.reduce((s,u)=>s+(u.balance||0),0);
    const totalDep     = deps.filter(d=>d.status==='completed').reduce((s,d)=>s+d.amount,0);
    const pendDeps     = deps.filter(d=>d.status==='pending');
    const pendWiths    = withs.filter(w=>w.status==='pending');
    const activeBots   = users.filter(u=>u.botStatus==='active').length;

    document.getElementById('main-content').innerHTML = `
      <div class="section-header">
        <div><div class="section-title">📊 الرئيسية</div><div class="section-subtitle">نظرة عامة على المنصة</div></div>
      </div>

      ${pendDeps.length>0 ? `
      <div class="alert-banner">
        ⚠️ يوجد <strong>${pendDeps.length}</strong> طلب إيداع معلق بانتظار الموافقة
        <button class="btn btn-warning btn-sm" style="margin-right:auto" onclick="showPage('deposits')">عرض الآن</button>
      </div>` : ''}

      ${pendWiths.length>0 ? `
      <div class="alert-banner">
        ⚠️ يوجد <strong>${pendWiths.length}</strong> طلب سحب معلق بانتظار التنفيذ
        <button class="btn btn-warning btn-sm" style="margin-right:auto" onclick="showPage('withdrawals')">عرض الآن</button>
      </div>` : ''}

      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">المستخدمون</div><div class="stat-value purple">${users.length}</div><div class="stat-sub">مسجل في المنصة</div></div>
        <div class="stat-card"><div class="stat-label">الرصيد الإجمالي</div><div class="stat-value cyan">${fmt(totalBalance)}</div><div class="stat-sub">USDT في الحسابات</div></div>
        <div class="stat-card"><div class="stat-label">إيداعات معلقة</div><div class="stat-value yellow">${pendDeps.length}</div><div class="stat-sub">بانتظار الموافقة</div></div>
        <div class="stat-card"><div class="stat-label">سحوبات معلقة</div><div class="stat-value yellow">${pendWiths.length}</div><div class="stat-sub">بانتظار التنفيذ</div></div>
        <div class="stat-card"><div class="stat-label">إجمالي الإيداعات</div><div class="stat-value green">${fmt(totalDep)}</div><div class="stat-sub">USDT مؤكدة</div></div>
        <div class="stat-card"><div class="stat-label">بوتات نشطة</div><div class="stat-value green">${activeBots}</div><div class="stat-sub">من أصل ${users.length}</div></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div>
          <div style="font-weight:700;margin-bottom:12px">💰 إيداعات معلقة</div>
          <div class="table-wrap"><table>
            <thead><tr><th>المستخدم</th><th>المبلغ</th><th>إجراء</th></tr></thead>
            <tbody>${pendDeps.length===0
              ? `<tr><td colspan="3" class="empty" style="padding:24px">لا يوجد طلبات</td></tr>`
              : pendDeps.slice(0,5).map(d=>`
              <tr>
                <td class="mono">${d.telegramId}</td>
                <td style="font-weight:600">${fmt(d.amount)} USDT</td>
                <td>
                  <div class="btn-group">
                    <button class="btn btn-success btn-sm" onclick="openDepositModal('${d._id}','approve',${esc(d)})">✔ قبول</button>
                    <button class="btn btn-danger  btn-sm" onclick="openDepositModal('${d._id}','reject', ${esc(d)})">✘ رفض</button>
                  </div>
                </td>
              </tr>`).join('')}
            </tbody>
          </table></div>
          ${pendDeps.length>5?`<div style="text-align:center;margin-top:8px"><button class="btn btn-ghost btn-sm" onclick="showPage('deposits')">عرض الكل (${pendDeps.length})</button></div>`:''}
        </div>

        <div>
          <div style="font-weight:700;margin-bottom:12px">💸 سحوبات معلقة</div>
          <div class="table-wrap"><table>
            <thead><tr><th>المستخدم</th><th>المبلغ</th><th>إجراء</th></tr></thead>
            <tbody>${pendWiths.length===0
              ? `<tr><td colspan="3" class="empty" style="padding:24px">لا يوجد طلبات</td></tr>`
              : pendWiths.slice(0,5).map(w=>`
              <tr>
                <td class="mono">${w.telegramId}</td>
                <td style="font-weight:600">${fmt(w.amount)} USDT</td>
                <td>
                  <div class="btn-group">
                    <button class="btn btn-success btn-sm" onclick="openWithdrawalModal('${w._id}','complete',${esc(w)})">✔ تنفيذ</button>
                    <button class="btn btn-danger  btn-sm" onclick="openWithdrawalModal('${w._id}','reject', ${esc(w)})">✘ رفض</button>
                  </div>
                </td>
              </tr>`).join('')}
            </tbody>
          </table></div>

// Quick top-up (تدفق 2)
async function quickTopup() {
  const telegramId = document.getElementById('tu-id').value.trim();
  const amount     = parseFloat(document.getElementById('tu-amount').value);
  const operation  = document.getElementById('tu-op').value;
  if (!telegramId) { showToast('❌ أدخل Telegram ID', 'error'); return; }
  if (isNaN(amount)||amount<0) { showToast('❌ أدخل مبلغًا صحيحًا', 'error'); return; }
  try {
    const res = await apiFetch(`/admin/users/${telegramId}/balance`, {
      method:'POST', body:JSON.stringify({amount,operation}),
    });
    showToast(`✔ تم — الرصيد الجديد: ${fmt(res.balance)} USDT (مستوى ${res.level})`, 'success');
    document.getElementById('tu-id').value='';
    document.getElementById('tu-amount').value='';
  } catch(err) { showToast('❌ فشل: '+err.message, 'error'); }
}

// ══════════════ DEPOSIT MODAL ══════════════
function openDepositModal(id, action, deposit) {
  pendingAction = { type:'deposit', id, action, data:deposit };
  const ok = action==='approve';
  document.getElementById('mdep-title').textContent    = ok ? '✔ قبول الإيداع' : '✘ رفض الإيداع';
  document.getElementById('mdep-subtitle').textContent = ok ? 'سيُضاف المبلغ الصافي لرصيد المستخدم تلقائياً' : 'سيُلغى الطلب ولن يُضاف أي رصيد';
  const btn = document.getElementById('mdep-confirm-btn');
  btn.textContent = ok ? 'تأكيد القبول' : 'تأكيد الرفض';
  btn.className   = `btn ${ok?'btn-success':'btn-danger'}`;
  btn.disabled    = false;
  const r=document.getElementById('mdep-reason');
  r.style.display = ok?'none':'block'; r.value='';
  if (deposit) document.getElementById('mdep-info').innerHTML=`
    <div class="modal-info-row"><span class="modal-info-label">المستخدم</span><span class="mono">${deposit.telegramId}</span></div>
    <div class="modal-info-row"><span class="modal-info-label">المبلغ المرسل</span><span style="font-weight:700">${fmt(deposit.amount)} USDT</span></div>
    <div class="modal-info-row"><span class="modal-info-label">الرسوم (5%)</span><span style="color:var(--warning)">${fmt(deposit.fee)} USDT</span></div>
    <div class="modal-info-row"><span class="modal-info-label">الصافي المضاف</span><span style="color:var(--success);font-weight:700">${fmt(deposit.netAmount)} USDT</span></div>
    <div class="modal-info-row"><span class="modal-info-label">الشبكة</span><span>${deposit.network||'TRC20'}</span></div>
    <div class="modal-info-row"><span class="modal-info-label">التاريخ</span><span style="color:var(--muted)">${fmtDate(deposit.createdAt)}</span></div>`;
  document.getElementById('modal-deposit').classList.add('open');
}

async function confirmDepositAction() {
  if (!pendingAction) return;
  const {id,action}=pendingAction;
  const reason=document.getElementById('mdep-reason').value.trim();
  const btn=document.getElementById('mdep-confirm-btn');
  btn.disabled=true; btn.textContent='جاري التنفيذ...';
  try {
    await apiFetch(`/admin/deposits/${id}/${action}`, {method:'POST',body:JSON.stringify({reason})});
    closeModal('modal-deposit');
    showToast(action==='approve'?'✔ تم قبول الإيداع وإضافة الرصيد':'✘ تم رفض الإيداع', action==='approve'?'success':'error');
    await loadDeposits(); loadBadges();
  } catch(err) { showToast('❌ فشل: '+err.message,'error'); btn.disabled=false; btn.textContent=action==='approve'?'تأكيد القبول':'تأكيد الرفض'; }
}

// ══════════════ HELPERS ══════════════
function closeModal(id) { document.getElementById(id).classList.remove('open'); pendingAction=null; }
document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id);}));
document.addEventListener('keydown',e=>{ if(e.key==='Escape') document.querySelectorAll('.modal-overlay.open').forEach(el=>closeModal(el.id)); });

function esc(obj) { return JSON.stringify(obj).replace(/"/g,'&quot;'); }
function fmt(n) { return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d) { if(!d)return'—'; return new Date(d).toLocaleString('ar',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function statusBadge(s) {
  const m={pending:'<span class="badge badge-pending">⏳ معلق</span>',completed:'<span class="badge badge-completed">✅ مكتمل</span>',rejected:'<span class="badge badge-rejected">❌ مرفوض</span>',processing:'<span class="badge badge-processing">⚙️ جاري</span>',active:'<span class="badge badge-active">🟢 نشط</span>',stopped:'<span class="badge badge-stopped">⏹️ متوقف</span>'};
  return m[s]||`<span class="badge">${s}</span>`;
}

let toastTimer;
function showToast(msg, type='success') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`show ${type}`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.className='';},3500);
}
function showError(msg) {
  document.getElementById('main-content').innerHTML=`<div class="empty" style="margin-top:80px"><div class="empty-icon">⚠️</div><div style="color:var(--danger);font-weight:600">${msg}</div><button class="btn btn-ghost" style="margin-top:16px" onclick="showPage(currentPage)">إعادة المحاولة</button></div>`;
}

// Auto-refresh badges every 30s
setInterval(()=>{ if(API_KEY) loadBadges(); }, 30000);
</script>
