<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم الأدمن</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222535;
    --border: #2e3148;
    --accent: #6c63ff;
    --accent2: #4ecca3;
    --danger: #ff4757;
    --warning: #ffa502;
    --success: #2ed573;
    --text: #e8eaf6;
    --muted: #8892b0;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── Login ── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .login-box .logo { font-size: 48px; margin-bottom: 12px; }
  .login-box h1 { font-size: 22px; margin-bottom: 6px; }
  .login-box p { color: var(--muted); margin-bottom: 28px; font-size: 13px; }
  .login-box input {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    margin-bottom: 14px;
    text-align: right;
    direction: ltr;
  }
  .login-box input:focus { outline: none; border-color: var(--accent); }
  .login-error { color: var(--danger); font-size: 13px; margin-top: -6px; margin-bottom: 10px; display: none; }

  /* ── App Shell ── */
  #app { display: none; flex-direction: column; min-height: 100vh; }

  /* ── Top Bar ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; }
  .topbar-brand span { font-size: 22px; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .badge-live {
    background: var(--success);
    color: #000;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* ── Layout ── */
  .layout { display: flex; flex: 1; }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 20px 0;
    flex-shrink: 0;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    border-right: 3px solid transparent;
    font-size: 13.5px;
  }
  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--accent); border-right-color: var(--accent); background: var(--surface2); }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .nav-badge {
    margin-right: auto;
    background: var(--danger);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    min-width: 20px;
    text-align: center;
  }

  /* ── Main Content ── */
  .main { flex: 1; padding: 28px; overflow-y: auto; }

  /* ── Section header ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-title { font-size: 20px; font-weight: 700; }
  .section-subtitle { color: var(--muted); font-size: 13px; margin-top: 2px; }

  /* ── Stat Cards ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .stat-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 700; }
  .stat-value.green { color: var(--success); }
  .stat-value.yellow { color: var(--warning); }
  .stat-value.purple { color: var(--accent); }
  .stat-value.cyan { color: var(--accent2); }
  .stat-sub { color: var(--muted); font-size: 12px; margin-top: 4px; }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-search {
    margin-right: auto;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 12px;
    width: 200px;
    direction: rtl;
  }
  .filter-search:focus { outline: none; border-color: var(--accent); }

  /* ── Table ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--surface2);
    padding: 12px 16px;
    text-align: right;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    border-bottom: 1px solid var(--border);
  }
  tbody td {
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  /* ── Badges ── */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-pending  { background: rgba(255,165,2,0.15);  color: var(--warning); }
  .badge-completed{ background: rgba(46,213,115,0.15); color: var(--success); }
  .badge-rejected { background: rgba(255,71,87,0.15);  color: var(--danger);  }
  .badge-processing{ background: rgba(108,99,255,0.15);color: var(--accent);  }
  .badge-active   { background: rgba(46,213,115,0.15); color: var(--success); }
  .badge-stopped  { background: rgba(136,146,176,0.15);color: var(--muted);   }

  /* ── Buttons ── */
  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-success { background: var(--success); color: #000; }
  .btn-danger  { background: var(--danger);  color: #fff; }
  .btn-accent  { background: var(--accent);  color: #fff; }
  .btn-warning { background: var(--warning); color: #000; }
  .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .btn-group { display: flex; gap: 6px; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px;
    width: 100%;
    max-width: 440px;
  }
  .modal h2 { font-size: 18px; margin-bottom: 6px; }
  .modal p  { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .modal-info { background: var(--surface2); border-radius: 8px; padding: 14px; margin-bottom: 20px; }
  .modal-info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
  .modal-info-row:last-child { margin-bottom: 0; }
  .modal-info-label { color: var(--muted); }
  .modal-input {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 8px;
    direction: ltr;
    text-align: right;
  }
  .modal-input:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 24px;
    font-size: 13px;
    z-index: 999;
    transition: transform 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--success); color: var(--success); }
  #toast.error   { border-color: var(--danger);  color: var(--danger);  }

  /* ── Loading ── */
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
  .spinner {
    width: 30px; height: 30px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── User detail card ── */
  .user-avatar {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; color: #fff;
    flex-shrink: 0;
  }
  .user-info { display: flex; align-items: center; gap: 10px; }
  .user-name { font-weight: 600; }
  .user-id   { color: var(--muted); font-size: 11px; }

  .mono { font-family: 'Courier New', monospace; font-size: 12px; color: var(--accent2); }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .sidebar { display: none; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .main { padding: 16px; }
    .filter-search { width: 100%; margin-right: 0; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════ LOGIN ══════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">🤖</div>
    <h1>لوحة التحكم</h1>
    <p>منصة التداول الذكية — Admin Panel</p>
    <input type="password" id="api-key-input" placeholder="أدخل مفتاح الأدمن (ADMIN_API_KEY)" />
    <div class="login-error" id="login-error">❌ مفتاح غير صحيح</div>
    <button class="btn btn-accent" style="width:100%;padding:12px" onclick="doLogin()">دخول</button>
  </div>
</div>

<!-- ══════════════════════════════ APP ══════════════════════════════ -->
<div id="app">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-brand">
      <span>🤖</span>
      لوحة التحكم
    </div>
    <div class="topbar-right">
      <span class="badge-live">● مباشر</span>
      <button class="btn btn-ghost btn-sm" onclick="refreshAll()">🔄 تحديث</button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">خروج</button>
    </div>
  </div>

  <div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
        <span class="nav-icon">📊</span> الرئيسية
      </div>
      <div class="nav-item" onclick="showPage('deposits')" id="nav-deposits">
        <span class="nav-icon">💰</span> الإيداعات
        <span class="nav-badge" id="badge-deposits" style="display:none">0</span>
      </div>
      <div class="nav-item" onclick="showPage('withdrawals')" id="nav-withdrawals">
        <span class="nav-icon">💸</span> السحوبات
        <span class="nav-badge" id="badge-withdrawals" style="display:none">0</span>
      </div>
      <div class="nav-item" onclick="showPage('users')" id="nav-users">
        <span class="nav-icon">👥</span> المستخدمون
      </div>
    </div>

    <!-- Main -->
    <div class="main" id="main-content">
      <div class="loading"><div class="spinner"></div>جاري التحميل...</div>
    </div>

  </div>
</div>

<!-- ══════════════════════════ MODALS ══════════════════════════════ -->

<!-- Deposit action modal -->
<div class="modal-overlay" id="modal-deposit">
  <div class="modal">
    <h2 id="mdep-title">معالجة الإيداع</h2>
    <p id="mdep-subtitle">تأكيد العملية</p>
    <div class="modal-info" id="mdep-info"></div>
    <textarea class="modal-input" id="mdep-reason" placeholder="سبب الرفض (اختياري)" rows="3" style="display:none;resize:none"></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-deposit')">إلغاء</button>
      <button class="btn" id="mdep-confirm-btn" onclick="confirmDepositAction()">تأكيد</button>
    </div>
  </div>
</div>

<!-- Withdrawal action modal -->
<div class="modal-overlay" id="modal-withdrawal">
  <div class="modal">
    <h2 id="mwith-title">معالجة السحب</h2>
    <p id="mwith-subtitle">تأكيد العملية</p>
    <div class="modal-info" id="mwith-info"></div>
    <textarea class="modal-input" id="mwith-reason" placeholder="سبب الرفض (اختياري)" rows="3" style="display:none;resize:none"></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-withdrawal')">إلغاء</button>
      <button class="btn" id="mwith-confirm-btn" onclick="confirmWithdrawalAction()">تأكيد</button>
    </div>
  </div>
</div>

<!-- Balance modal -->
<div class="modal-overlay" id="modal-balance">
  <div class="modal">
    <h2>تعديل الرصيد</h2>
    <p id="mbal-subtitle">تعديل رصيد المستخدم</p>
    <div class="modal-info" id="mbal-info"></div>
    <select class="modal-input" id="mbal-op" style="cursor:pointer">
      <option value="add">إضافة للرصيد</option>
      <option value="set">تعيين رصيد جديد</option>
    </select>
    <input type="number" class="modal-input" id="mbal-amount" placeholder="المبلغ (USDT)" min="0" step="0.01" />
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-balance')">إلغاء</button>
      <button class="btn btn-accent" onclick="confirmBalanceAction()">تطبيق</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════════════════
let API_KEY = '';
let currentPage = 'dashboard';
let allDeposits = [], allWithdrawals = [], allUsers = [];
let pendingAction = null; // { type, id, action }
let pendingBalanceUser = null;

// ══════════════════════════════════════════════════════════
//  Auth
// ══════════════════════════════════════════════════════════
function doLogin() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  API_KEY = key;
  // Try a real request to validate
  apiFetch('/admin/users?limit=1')
    .then(() => {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('login-error').style.display = 'none';
      sessionStorage.setItem('admin_key', key);
      showPage('dashboard');
    })
    .catch(() => {
      API_KEY = '';
      document.getElementById('login-error').style.display = 'block';
    });
}

function logout() {
  sessionStorage.removeItem('admin_key');
  API_KEY = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('api-key-input').value = '';
}

document.getElementById('api-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// Auto-login if key stored in session
window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('admin_key');
  if (saved) {
    document.getElementById('api-key-input').value = saved;
    doLogin();
  }
});

// ══════════════════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════════════════
async function apiFetch(path, options = {}) {
  const res = await fetch(path, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      'x-admin-key': API_KEY,
      ...(options.headers || {}),
    },
  });
  if (res.status === 401) throw new Error('unauthorized');
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.error || res.statusText);
  }
  return res.json();
}

// ══════════════════════════════════════════════════════════
//  Navigation
// ══════════════════════════════════════════════════════════
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + page).classList.add('active');
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading"><div class="spinner"></div>جاري التحميل...</div>';
  if (page === 'dashboard')   loadDashboard();
  if (page === 'deposits')    loadDeposits();
  if (page === 'withdrawals') loadWithdrawals();
  if (page === 'users')       loadUsers();
}

function refreshAll() {
  loadBadges();
  showPage(currentPage);
}

// ══════════════════════════════════════════════════════════
//  Badges (pending count in sidebar)
// ══════════════════════════════════════════════════════════
async function loadBadges() {
  try {
    const [deps, withs] = await Promise.all([
      apiFetch('/admin/deposits?status=pending'),
      apiFetch('/admin/withdrawals?status=pending'),
    ]);
    const db = document.getElementById('badge-deposits');
    const wb = document.getElementById('badge-withdrawals');
    db.textContent = deps.count;
    db.style.display = deps.count > 0 ? 'inline-block' : 'none';
    wb.textContent = withs.count;
    wb.style.display = withs.count > 0 ? 'inline-block' : 'none';
  } catch (_) {}
}

// ══════════════════════════════════════════════════════════
//  Dashboard
// ══════════════════════════════════════════════════════════
async function loadDashboard() {
  try {
    const [usersData, depsData, withsData] = await Promise.all([
      apiFetch('/admin/users'),
      apiFetch('/admin/deposits'),
      apiFetch('/admin/withdrawals'),
    ]);

    const users = usersData.users;
    const deps  = depsData.deposits;
    const withs = withsData.withdrawals;

    const totalBalance    = users.reduce((s, u) => s + (u.balance || 0), 0);
    const totalDeposited  = deps.filter(d => d.status === 'completed').reduce((s, d) => s + d.amount, 0);
    const pendingDeps     = deps.filter(d => d.status === 'pending').length;
    const pendingWiths    = withs.filter(w => w.status === 'pending').length;
    const activeBots      = users.filter(u => u.botStatus === 'active').length;

    // Recent activity (last 6)
    const recentDeps  = deps.slice(0, 4);
    const recentWiths = withs.slice(0, 4);

    document.getElementById('main-content').innerHTML = `
      <div class="section-header">
        <div>
          <div class="section-title">📊 الرئيسية</div>
          <div class="section-subtitle">نظرة عامة على المنصة</div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">إجمالي المستخدمين</div>
          <div class="stat-value purple">${users.length}</div>
          <div class="stat-sub">مسجل في المنصة</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">الرصيد الإجمالي</div>
          <div class="stat-value cyan">${fmt(totalBalance)}</div>
          <div class="stat-sub">USDT في جميع الحسابات</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">إيداعات معلقة</div>
          <div class="stat-value yellow">${pendingDeps}</div>
          <div class="stat-sub">بانتظار الموافقة</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">سحوبات معلقة</div>
          <div class="stat-value yellow">${pendingWiths}</div>
          <div class="stat-sub">بانتظار التنفيذ</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">إجمالي الإيداعات</div>
          <div class="stat-value green">${fmt(totalDeposited)}</div>
          <div class="stat-sub">USDT مؤكدة</div>

function openDepositModal(id, action, deposit) {
  pendingAction = { type: 'deposit', id, action, data: deposit };

  document.getElementById('mdep-title').textContent    = isApprove ? '✔ قبول الإيداع' : '✘ رفض الإيداع';
  document.getElementById('mdep-subtitle').textContent = isApprove ? 'سيُضاف المبلغ الصافي لرصيد المستخدم' : 'سيُلغى الطلب';
  const btn = document.getElementById('mdep-confirm-btn');
  btn.textContent  = isApprove ? 'تأكيد القبول' : 'تأكيد الرفض';
  btn.className    = `btn ${isApprove ? 'btn-success' : 'btn-danger'}`;
  const reason = document.getElementById('mdep-reason');
  reason.style.display = isApprove ? 'none' : 'block';
  reason.value = '';

  if (deposit) {
    document.getElementById('mdep-info').innerHTML = `

      <div class="modal-info-row"><span class="modal-info-label">الشبكة</span><span>${deposit.network||'TRC20'}</span></div>

  }
  document.getElementById('modal-deposit').classList.add('open');
}

async function confirmDepositAction() {
  if (!pendingAction) return;
  const { id, action } = pendingAction;
  const reason = document.getElementById('mdep-reason').value.trim();
  try {
    const btn = document.getElementById('mdep-confirm-btn');

    btn.textContent = 'جاري التنفيذ...';

// ══════════════════════════════════════════════════════════
//  Helpers
// ══════════════════════════════════════════════════════════
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  pendingAction = null;
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
});

// Escape key closes modals
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(el => closeModal(el.id));
});

function fmt(n) {
  return Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('ar', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function statusBadge(status) {
  const map = {
    pending:    '<span class="badge badge-pending">⏳ معلق</span>',
    completed:  '<span class="badge badge-completed">✅ مكتمل</span>',
    rejected:   '<span class="badge badge-rejected">❌ مرفوض</span>',
    processing: '<span class="badge badge-processing">⚙️ جاري</span>',
    active:     '<span class="badge badge-active">🟢 نشط</span>',
    stopped:    '<span class="badge badge-stopped">⏹️ متوقف</span>',
  };
  return map[status] || `<span class="badge">${status}</span>`;
}

let toastTimer;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3500);
}

function showError(msg) {
  document.getElementById('main-content').innerHTML = `
    <div class="empty" style="margin-top:80px">
      <div class="empty-icon">⚠️</div>
      <div style="color:var(--danger);font-weight:600">${msg}</div>
      <button class="btn btn-ghost" style="margin-top:16px" onclick="showPage(currentPage)">إعادة المحاولة</button>
    </div>`;
}

// Auto-refresh badges every 30 seconds
setInterval(() => { if (API_KEY) loadBadges(); }, 30000);
